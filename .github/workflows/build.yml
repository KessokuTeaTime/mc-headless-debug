name: Build

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
      - uses: gradle/actions/setup-gradle@v6
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.15.1 --activate
      - name: Validate TypeScript workspace
        run: |
          pnpm install --frozen-lockfile
          pnpm check
          pnpm test
          pnpm build
      - name: Build Minecraft 26.2 bridges
        working-directory: adapters/minecraft-java/26.2/bridge
        run: ./gradlew build --console=plain
